{% extends "base.html" %}
{% block title %}Nueva Cuenta · ExpensePay{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <h1 class="h3 mb-3"><i class="bi bi-bank text-primary"></i> Nueva Cuenta Bancaria</h1>
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <form method="post" action="{{ url_for('bank_accounts.create_account') }}">
          <div class="mb-3">
            <label for="account_name" class="form-label">Nombre de la cuenta</label>
            <input type="text" class="form-control" id="account_name" name="account_name" required>
          </div>
          <div class="mb-3">
            <label for="bank_name" class="form-label">Banco</label>
            <input type="text" class="form-control" id="bank_name" name="bank_name" required>
          </div>
          <div class="mb-3">
            <label for="account_number" class="form-label">Número de cuenta</label>
            <input type="text" class="form-control" id="account_number" name="account_number" required>
          </div>
          <div class="mb-3">
            <label for="initial_balance" class="form-label">Saldo inicial</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number" step="0.01" min="0" value="0" class="form-control"
                     id="initial_balance" name="initial_balance">
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Guardar</button>
            <a href="{{ url_for('bank_accounts.list_accounts') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
