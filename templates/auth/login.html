{% extends "base.html" %}
{% block title %}Iniciar sesión · ExpensePay{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-cash-coin display-5 text-primary"></i>
          <h1 class="h4 mt-2 mb-0">ExpensePay</h1>
          <p class="text-muted small">Gestión de Gastos y Pagos</p>
        </div>
        <form method="post" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label for="username" class="form-label">Usuario</label>
            <input type="text" class="form-control" id="username" name="username"
                   value="{{ username or '' }}" required autofocus>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right"></i> Ingresar
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted small mt-3">Usuario demo: <code>admin</code></p>
  </div>
</div>
{% endblock %}
