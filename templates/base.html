<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Gestión de Gastos y Pagos{% endblock %}</title>

  <!-- Bootstrap 5 (admin-grade styling without a heavy template dependency) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
{% if current_user.is_authenticated %}
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="{{ url_for('dashboard.index') }}">
        <i class="bi bi-cash-coin me-1"></i> ExpensePay
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.endpoint == 'dashboard.index' }}" href="{{ url_for('dashboard.index') }}">
              <i class="bi bi-speedometer2"></i> Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.blueprint == 'expenses' }}" href="{{ url_for('expenses.list_expenses') }}">
              <i class="bi bi-receipt"></i> Gastos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.blueprint == 'payments' }}" href="{{ url_for('payments.list_payments') }}">
              <i class="bi bi-credit-card"></i> Pagos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.blueprint == 'bank_accounts' }}" href="{{ url_for('bank_accounts.list_accounts') }}">
              <i class="bi bi-bank"></i> Cuentas</a>
          </li>
        </ul>
        <span class="navbar-text text-light me-3">
          <i class="bi bi-person-circle"></i> {{ current_user.username }}
        </span>
        <form method="post" action="{{ url_for('auth.logout') }}" class="d-inline">
          <button class="btn btn-outline-light btn-sm" type="submit">
            <i class="bi bi-box-arrow-right"></i> Salir</button>
        </form>
      </div>
    </div>
  </nav>
{% endif %}

  <main class="container-fluid py-4 px-md-4">
    {% include "partials/_flash.html" %}
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-muted small py-3">
    ExpensePay &middot; Prueba Técnica &middot; {{ now.year }}
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
